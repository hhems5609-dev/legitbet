<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegitBet | Live</title>
    <style>
        /* Exact color palette from your original build */
        :root {
            --bg-main: #0b0e11;
            --bg-secondary: #15191d;
            --accent-green: #00ff88;
            --text-grey: #8a8d91;
            --btn-dark: #2b2f36;
        }

        body { 
            background-color: var(--bg-main); 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; 
            padding-bottom: 90px; 
        }

        /* Top Header */
        .header { 
            background: var(--bg-secondary); 
            padding: 12px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #2b2f36;
        }
        .logo { color: var(--accent-green); font-weight: 800; font-size: 22px; }
        .logo span { color: white; opacity: 0.7; font-size: 14px; }
        .balance-box { background: #1c2127; padding: 4px 12px; border-radius: 8px; text-align: center; }
        .deposit-btn { background: #ffda00; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; }

        /* Jackpot Banner */
        .jackpot-banner { 
            background: linear-gradient(90deg, #004d2c, #008f4f); 
            margin: 12px; padding: 20px; border-radius: 12px; position: relative; overflow: hidden;
        }
        .jackpot-text { font-size: 11px; font-weight: bold; letter-spacing: 1px; }
        .jackpot-title { font-size: 28px; font-weight: 900; margin: 4px 0; color: #ffda00; }
        .jackpot-amount { position: absolute; right: 10px; top: 10px; font-size: 50px; font-weight: 900; opacity: 0.2; }

        /* Navigation Tabs */
        .tabs { display: flex; gap: 8px; padding: 12px; background: var(--bg-secondary); overflow-x: auto; scrollbar-width: none; }
        .tab { background: #2b2f36; padding: 10px 18px; border-radius: 100px; font-size: 13px; border: none; color: white; font-weight: 600; }
        .tab.active { background: var(--accent-green); color: black; }

        /* Match Card - Restoring the Row Layout */
        .match-card { 
            padding: 16px; 
            border-bottom: 1px solid #1c2127;
            position: relative;
        }
        .league-info { font-size: 10px; color: #4e88ff; margin-bottom: 8px; }
        .match-main { display: flex; justify-content: space-between; align-items: center; }
        .team-names { font-size: 15px; font-weight: 600; line-height: 1.4; }
        .odds-container { display: flex; gap: 6px; }
        .odd-box { 
            background: #1c2127; 
            border: 1px solid #2b2f36;
            width: 60px; 
            height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 6px;
            font-weight: 800;
            font-size: 14px;
        }
        .markets-link { color: var(--accent-green); font-size: 11px; text-align: right; margin-top: 5px; font-weight: bold; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--bg-secondary); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #2b2f36; }
        .nav-item { text-align: center; color: var(--text-grey); font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--accent-green); }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">LEGITBET<span>.COM</span></div>
        <div class="balance-box">
            <div style="font-size: 8px; color: var(--text-grey);">BALANCE</div>
            <div style="color: var(--accent-green); font-weight: bold;">KES 1,000.00</div>
        </div>
        <button class="deposit-btn">Deposit</button>
    </div>

    <div class="jackpot-banner">
        <div class="jackpot-text">MIDWEEK</div>
        <div class="jackpot-title">JACKPOT</div>
        <div style="font-size: 12px; font-weight: bold;">Stake from KES 15 only!</div>
        <div class="jackpot-amount">50M</div>
    </div>

    <div class="tabs">
        <button class="tab active">Highlights</button>
        <button class="tab">Upcoming</button>
        <button class="tab">Countries</button>
        <button class="tab">Jackpots</button>
    </div>

    <div id="odds-container">
        </div>

    <div class="bottom-nav">
        <div class="nav-item active">🏠<br>HOME</div>
        <div class="nav-item">▶️<br>LIVE</div>
        <div class="nav-item" style="background: #ffda00; color: black; padding: 5px 15px; border-radius: 10px;">📋<br>BETSLIP</div>
        <div class="nav-item">📋<br>MY BETS</div>
        <div class="nav-item">👤<br>PROFILE</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
