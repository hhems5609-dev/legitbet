<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegitBet | Live</title>
    <style>
        :root { --bg-dark: #0b0e11; --bg-card: #15191d; --accent: #00ff88; --text-dim: #8a8d91; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; padding-bottom: 90px; }
        
        /* Header & Balance */
        .header { background: var(--bg-card); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2b2f36; }
        .logo { color: var(--accent); font-weight: 800; font-size: 22px; }
        .balance-box { background: #1c2127; padding: 4px 12px; border-radius: 8px; text-align: center; border: 1px solid #2b2f36; }
        .deposit-btn { background: #ffda00; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; }

        /* Sports Icons Menu - MISSING FEATURE RESTORED */
        .sports-menu { display: flex; gap: 20px; padding: 10px 15px; background: var(--bg-card); overflow-x: auto; border-bottom: 1px solid #222; }
        .sport-item { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: bold; color: var(--text-dim); white-space: nowrap; }
        .sport-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 5px; }

        /* Jackpot */
        .jackpot-banner { background: linear-gradient(90deg, #004d2c, #008f4f); margin: 12px; padding: 20px; border-radius: 12px; position: relative; }
        .jackpot-title { font-size: 24px; font-weight: 900; color: #ffda00; }

        /* Tabs & Column Labels - MISSING FEATURE RESTORED */
        .tabs { display: flex; gap: 8px; padding: 12px; background: var(--bg-card); }
        .tab { background: #2b2f36; padding: 8px 16px; border-radius: 20px; font-size: 12px; border: none; color: white; font-weight: bold; }
        .tab.active { background: var(--accent); color: black; }
        .column-labels { display: flex; justify-content: flex-end; padding: 5px 25px; font-size: 11px; color: var(--text-dim); font-weight: bold; gap: 55px; }

        /* Match Rows */
        .match-row { padding: 15px; border-bottom: 1px solid #1c2127; }
        .league { font-size: 10px; color: #4e88ff; margin-bottom: 5px; }
        .match-flex { display: flex; justify-content: space-between; align-items: center; }
        .teams { font-size: 14px; font-weight: bold; width: 50%; }
        .odds-grp { display: flex; gap: 5px; }
        .odd { background: #1c2127; width: 55px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: bold; border: 1px solid #2b2f36; }
        .markets { color: var(--accent); font-size: 11px; text-align: right; margin-top: 5px; font-weight: bold; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--bg-card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; }
        .nav-link { text-align: center; color: var(--text-dim); font-size: 10px; text-decoration: none; }
        .nav-link.active { color: var(--accent); }
        .betslip-pill { background: #ffda00; color: black; padding: 5px 15px; border-radius: 12px; font-weight: 900; position: relative; top: -5px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">LEGITBET</div>
        <div class="balance-box">
            <div style="font-size: 8px; color: var(--text-dim);">BALANCE</div>
            <div style="color: var(--accent); font-weight: bold;">KES 1,000.00</div>
        </div>
        <button class="deposit-btn">Deposit</button>
    </div>

        <div class="sports-menu">
        <div class="sport-item active" onclick="location.reload()">⚽ Soccer</div>
        <div class="sport-item" onclick="alert('Basketball coming soon!')">🏀 Basketball</div>
        <div class="sport-item" onclick="alert('Loading Casino Games...')">🎰 Casino</div>
        <div class="sport-item" onclick="alert('Launching Crash...')">🚀 Crash</div>
    </div>

    <div class="jackpot-banner">
        <div style="font-size: 10px; font-weight: bold;">MIDWEEK</div>
        <div class="jackpot-title">JACKPOT</div>
        <div style="font-size: 40px; position: absolute; right: 15px; top: 10px; opacity: 0.2; font-weight: 900;">50M</div>
    </div>

    <div class="tabs">
        <button class="tab active">Highlights</button>
        <button class="tab">Upcoming</button>
        <button class="tab">Jackpots</button>
    </div>

    <div class="column-labels">
        <span>1</span><span>X</span><span>2</span>
    </div>

    <div id="odds-container"></div>

    <nav class="nav">
        <a class="nav-link active">🏠<br>HOME</a>
        <a class="nav-link">▶️<br>LIVE</a>
        <div class="nav-link betslip-pill">📋<br>BETSLIP</div>
        <a class="nav-link">📋<br>MY BETS</a>
        <a class="nav-link">👤<br>PROFILE</a>
    </nav>

    <script src="app.js"></script>
</body>
</html>
