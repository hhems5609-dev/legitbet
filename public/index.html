<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegitBet</title>
    <style>
        body { 
    background-color: #0b0e11; 
    color: white; 
    font-family: 'Roboto', sans-serif; 
    margin: 0; 
    padding-bottom: 70px; 
}
.header { 
    background: #15191d; 
    padding: 15px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    border-bottom: 1px solid #2b2f36; 
}
.logo { color: #00ff88; font-weight: bold; font-size: 20px; letter-spacing: 1px; }
.jackpot-banner { 
    background: linear-gradient(135deg, #004d2c 0%, #008f4f 100%); 
    margin: 12px; 
    padding: 20px; 
    border-radius: 12px; 
    position: relative;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.match-card { 
    background: #15191d; 
    margin: 10px; 
    padding: 15px; 
    border-radius: 8px; 
    border-left: 4px solid #00ff88; 
}
.odds-row { display: flex; gap: 8px; margin-top: 12px; }
.btn-odd { 
    flex: 1; 
    background: #2b2f36; 
    color: #00ff88; 
    border: none; 
    padding: 10px; 
    border-radius: 4px; 
    font-weight: bold;
    font-size: 14px;
}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">LEGITBET</div>
        <button style="background:#ffda00; border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">Deposit</button>
    </div>

    <div class="banner">
        <div style="font-weight:bold;">MIDWEEK JACKPOT</div>
        <div style="color:#00ff88;">KES 15 -> 50,000,000</div>
    </div>

    <div id="odds-container">
        <p style="text-align:center; color:#888;">Loading Live Markets...</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
