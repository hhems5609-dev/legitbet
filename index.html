<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegitBet | Live</title>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .header { background: #15191d; padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid #00ff88; }
        .logo { color: #00ff88; font-weight: bold; font-size: 20px; }
        .jackpot { background: linear-gradient(90deg, #004d2c, #008f4f); margin: 10px; padding: 20px; border-radius: 10px; }
        
        /* THE BOX WHERE MATCHES GO */
        #odds-container { min-height: 200px; padding: 10px; }
        
        .match-card { background: #1e2124; margin-bottom: 10px; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .odds-row { display: flex; gap: 10px; margin-top: 10px; }
        .odd-btn { flex: 1; background: #2b2f36; color: #00ff88; border: none; padding: 10px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">LEGITBET</div>
        <button style="background:#ffda00; border:none; padding:5px 15px; border-radius:4px;">Deposit</button>
    </div>

    <div class="jackpot">
        <div style="font-weight:bold;">MIDWEEK JACKPOT</div>
        <div style="color:#00ff88; font-size:12px;">Stake KES 15 -> Win 50M</div>
    </div>

    <div id="odds-container">
        <p style="text-align:center; color:#888;">Searching for live matches...</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
