<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEGIT BET.COM</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">LEGIT <span>BET.COM</span></div>
    <div class="top-actions">
      <button class="deposit">Deposit</button>
      <button class="icon">🔍</button>
      <button class="icon">☰</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="active">Soccer</button>
    <button>Basketball</button>
    <button>Tennis</button>
    <button>Jackpots</button>
  </nav>

  <section class="banner">
    <div class="banner-card">
      <h2>RUSH HOUR</h2>
      <p>Fast odds-style sports demo UI</p>
    </div>
  </section>

  <section class="match-list" id="matchList"></section>

  <footer class="bottom-nav">
    <button>🏠<span>Home</span></button>
    <button>📰<span>Live</span></button>
    <button class="center">🟡</button>
    <button>🎟️<span>My Picks</span></button>
    <button>👤<span>Account</span></button>
  </footer>

  <script src="script.js"></script>
</body>
</html>
